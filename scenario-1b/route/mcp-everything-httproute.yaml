---
# /mcp — MCP proxy route through AgentGateway
# Dedicated MCP gateway (agentgateway-proxy-mcp) — "isolated proxy" pattern
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-everything
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy-mcp
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: mcp-everything-backend
          group: agentgateway.dev
          kind: AgentgatewayBackend
      timeouts:
        request: "0s"
