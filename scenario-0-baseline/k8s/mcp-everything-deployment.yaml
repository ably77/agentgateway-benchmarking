---
# MCP Everything Server — reference implementation with sampleLLM tool
# sampleLLM tool calls back through agentgateway to the mock OpenAI backend
# Exposes streamable-HTTP MCP endpoint on port 3001
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-everything
  namespace: ai-platform
  labels:
    app: mcp-server-everything
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server-everything
  template:
    metadata:
      labels:
        app: mcp-server-everything
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
    spec:
      nodeSelector:
        workload: capability
      tolerations:
        - key: workload
          operator: Equal
          value: capability
          effect: NoSchedule
      containers:
        - name: mcp-everything
          image: node:20-alpine
          command:
            - sh
            - -c
            - |
              export NODE_OPTIONS="--max-old-space-size=10240 --max-semi-space-size=64"
              npx -y @modelcontextprotocol/server-everything streamableHttp
          ports:
            - name: mcp-http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "3500m"
              memory: "12Gi"
            limits:
              cpu: "3500m"
              memory: "12Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server-everything
  namespace: ai-platform
  labels:
    app: mcp-server-everything
spec:
  selector:
    app: mcp-server-everything
  ports:
    - name: mcp-http
      port: 8080
      targetPort: 3001
      appProtocol: kgateway.dev/mcp
