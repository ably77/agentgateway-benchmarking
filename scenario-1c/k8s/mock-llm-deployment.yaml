---
# Mock LLM — llm-d-inference-sim in echo mode
# --mode echo: mirrors the last user message back as the assistant reply
# Perfect for load testing: deterministic, zero compute, measures pure gateway overhead
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-llm
  namespace: ai-platform
  labels:
    app: mock-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-llm
  template:
    metadata:
      labels:
        app: mock-llm
    spec:
      nodeSelector:
        workload: capability
      tolerations:
        - key: workload
          operator: Equal
          value: capability
          effect: NoSchedule
      containers:
        - name: vllm-sim
          image: ghcr.io/llm-d/llm-d-inference-sim:latest
          args:
            - --model
            - mock-gpt-4o-mini
            - --port
            - "8000"
            - --mode
            - echo
            - --v=0
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "3500m"
              memory: "12Gi"
            limits:
              cpu: "3500m"
              memory: "12Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: mock-llm
  namespace: ai-platform
  labels:
    app: mock-llm
spec:
  selector:
    app: mock-llm
  ports:
    - name: http
      port: 8080
      targetPort: 8000
